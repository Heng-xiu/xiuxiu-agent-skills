<!doctype html>
<!--
  artifact-base.html — know-your-unknowns 共用工件骨架

  這份檔案本身不是要直接產出給使用者的工件，而是給 agent／其他模板參考的骨架範本。
  它示範了六份模板共用的：
    - CSS 視覺 token（四象限色／三階段色／深淺主題），需與 SITE_SPEC 2.2 節色碼家族一致
    - 深/淺主題切換（跟隨系統 prefers-color-scheme，並可手動切換、存 localStorage）
    - prefers-reduced-motion 支援
    - 鍵盤可操作的基礎元件（button、details/summary、focus-visible）
    - 複製到剪貼簿的通用邏輯（.copy-btn + data-copy-target）
    - 頂部 meta bar：階段徽章／象限徽章／產生時間／來源任務（皆為佔位，agent 填入實際資料）

  其餘五份模板（blindspot-cards.html、interview-decisions.html、decision-log.html、
  buy-in-doc.html、merge-quiz.html）都是「這份骨架 + 該模板特有結構」的完整範例檔。
-->
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- INSERT: 工件標題，例如「盲點掃描 — Acme SSO 整合」 -->
<title>Know Your Unknowns 工件 — 骨架範本</title>
<style>
  :root {
    color-scheme: light dark;
    /* 基礎色（與 SITE_SPEC 2.2 節淺色主題基準一致） */
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f2f2f5;
    --border: #e2e2e6;
    --text: #1a1a1a;
    --text-muted: #5c5c66;
    --accent: #0d9488;
    --accent-contrast: #ffffff;

    /* 四象限色（灰藍／琥珀／紫／紅珊瑚），需與 references/quadrants.md 一致 */
    --q-known-known: #375074;
    --q-known-unknown: #8a5a00;
    --q-unknown-known: #7c3aed;
    --q-unknown-unknown: #c62828;

    /* 三階段色（綠／藍／靛紫） */
    --p-pre: #137333;
    --p-during: #1656c9;
    --p-post: #5b21b6;

    --radius: 12px;
    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-6: 48px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --transition-fast: 160ms ease-out;
    --transition-med: 240ms ease-out;
  }

  /* 跟隨系統深色（除非使用者手動切成淺色） */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #2dd4bf;
      --accent-contrast: #062723;

      --q-known-known: #93a8c7;
      --q-known-unknown: #f2c14e;
      --q-unknown-known: #cf9dfa;
      --q-unknown-unknown: #ff8a80;

      --p-pre: #5ee69c;
      --p-during: #79b8ff;
      --p-post: #b79cf7;
    }
  }

  /* 手動切換（存 localStorage），優先於系統設定 */
  :root[data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #2dd4bf;
    --accent-contrast: #062723;

    --q-known-known: #93a8c7;
    --q-known-unknown: #f2c14e;
    --q-unknown-known: #cf9dfa;
    --q-unknown-unknown: #ff8a80;

    --p-pre: #5ee69c;
    --p-during: #79b8ff;
    --p-post: #b79cf7;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img, svg { max-width: 100%; }

  .skip-link {
    position: absolute;
    left: -999px;
    top: auto;
    background: var(--accent);
    color: var(--accent-contrast);
    padding: 8px 16px;
    border-radius: 8px;
    z-index: 100;
  }
  .skip-link:focus { left: 16px; top: 16px; }

  a { color: var(--accent); }
  :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .wrap { max-width: 960px; margin: 0 auto; padding: 0 var(--space-3); }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: var(--space-2) var(--space-3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
  }
  .brand { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.01em; }
  .brand small { display: block; font-weight: 400; color: var(--text-muted); font-size: 0.75rem; }

  .theme-toggle {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color var(--transition-fast), transform var(--transition-fast);
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .theme-toggle:active { transform: scale(0.94); }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: inline-flex; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: inline-flex; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: inline-flex; }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: none; }
  }

  .meta-bar {
    max-width: 960px;
    margin: 0 auto;
    padding: var(--space-2) var(--space-3) 0;
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.28em 0.75em;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface);
  }
  .badge .dot { width: 0.55em; height: 0.55em; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .badge-phase-pre { border-color: var(--p-pre); color: var(--p-pre); }
  .badge-phase-pre .dot { background: var(--p-pre); }
  .badge-phase-during { border-color: var(--p-during); color: var(--p-during); }
  .badge-phase-during .dot { background: var(--p-during); }
  .badge-phase-post { border-color: var(--p-post); color: var(--p-post); }
  .badge-phase-post .dot { background: var(--p-post); }

  .badge-q-known-known { border-color: var(--q-known-known); color: var(--q-known-known); }
  .badge-q-known-known .dot { background: var(--q-known-known); }
  .badge-q-known-unknown { border-color: var(--q-known-unknown); color: var(--q-known-unknown); }
  .badge-q-known-unknown .dot { background: var(--q-known-unknown); }
  .badge-q-unknown-known { border-color: var(--q-unknown-known); color: var(--q-unknown-known); }
  .badge-q-unknown-known .dot { background: var(--q-unknown-known); }
  .badge-q-unknown-unknown { border-color: var(--q-unknown-unknown); color: var(--q-unknown-unknown); }
  .badge-q-unknown-unknown .dot { background: var(--q-unknown-unknown); }

  .meta-text { font-size: 0.78rem; color: var(--text-muted); }

  main { padding: var(--space-4) 0 var(--space-6); }

  h1 { font-size: 1.6rem; margin: 0 0 var(--space-1); }
  h2 { font-size: 1.2rem; margin: var(--space-4) 0 var(--space-2); }
  h3 { font-size: 1rem; margin: 0 0 var(--space-1); }
  p { margin: 0 0 var(--space-2); }
  .subtitle { color: var(--text-muted); margin-bottom: var(--space-3); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-3);
  }

  .code-block {
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: var(--space-2);
    padding-top: calc(var(--space-2) + 28px);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .copy-btn:hover { border-color: var(--accent); }

  details.expand > summary {
    cursor: pointer;
    list-style: none;
  }
  details.expand > summary::-webkit-details-marker { display: none; }

  footer {
    border-top: 1px solid var(--border);
    padding: var(--space-3);
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    html { scroll-behavior: auto; }
  }

  @media (max-width: 640px) {
    .topbar-inner, .meta-bar, .wrap { padding-left: var(--space-2); padding-right: var(--space-2); }
  }
</style>
</head>
<body>

  <div class="topbar-inner">

      <small><!-- INSERT: 這份工件屬於哪個步驟，例如「A1 盲點掃描」 --></small>

<div class="meta-bar" role="group" aria-label="工件中繼資訊：階段、對付的象限、產生時間、來源任務">
  <!-- INSERT: 階段徽章，四選一，class 對應 badge-phase-pre / badge-phase-during / badge-phase-post -->

      <p>這裡是骨架範本，實際內容請參考 <code>blindspot-cards.html</code>、<code>interview-decisions.html</code>、<code>decision-log.html</code>、<code>buy-in-doc.html</code>、<code>merge-quiz.html</code>。</p>

<script>
(function () {
  var root = document.documentElement;
  var STORAGE_KEY = 'kyu-theme';
  var stored = null;
  try { stored = localStorage.getItem(STORAGE_KEY); } catch (e) {}
  if (stored === 'dark' || stored === 'light') { root.setAttribute('data-theme', stored); }

  function currentTheme() {
    var attr = root.getAttribute('data-theme');
    if (attr) return attr;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }

  function init() {
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', function () {
        var next = currentTheme() === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
      });
    }

    // 通用複製到剪貼簿：<button class="copy-btn" data-copy-target="某個帶 id 的元素">
    var copyBtns = document.querySelectorAll('.copy-btn');
    for (var i = 0; i < copyBtns.length; i++) {
      (function (b) {
        b.addEventListener('click', function () {
          var targetId = b.getAttribute('data-copy-target');
          var target = targetId ? document.getElementById(targetId) : null;
          if (!target) return;
          var text = target.innerText || target.textContent || '';
          var original = b.textContent;
          function done() {
            b.textContent = '已複製';
            setTimeout(function () { b.textContent = original; }, 1600);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done, done);
          } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
            done();
          }
        });
      })(copyBtns[i]);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
